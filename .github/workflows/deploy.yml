name: Deploy to VPS
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build React App
        run: |
          npm install
          npm run build

      - name: Debug and Verify Build
        run: |
          echo "Listing files in dist/ folder:"
          ls -R dist/ || echo "dist folder not found!"

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 120s
          source: "dist/*"
          target: "/var/www/argylemedical"
          strip_components: 1
